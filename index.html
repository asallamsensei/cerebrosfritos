<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japonés para Cerebros Fritos</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:radial-gradient(circle at top,#17132b,#050510);
  color:white;
  text-align:center;
  padding:24px 14px 50px;
}

.wrap{
  max-width:900px;
  margin:auto;
}

h1{
  font-size:clamp(30px,6vw,46px);
  margin:18px 0 24px;
}

.card{
  position:relative;
  overflow:hidden;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.16);
  border-radius:16px;
  padding:18px;
  margin:16px 0;
  box-shadow:0 10px 25px rgba(0,0,0,0.35);
}

.card:hover{
  transform:translateY(-3px);
  border-color:#ff7a18;
}

.card::before{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:60%;
  height:100%;
  background:linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.28),
    transparent
  );
  transform:skewX(-25deg);
}

.card:hover::before{
  animation:shine 1s ease;
}

@keyframes shine{
  100%{left:150%}
}

img{
  width:100%;
  max-width:100%;
  display:block;
  border-radius:14px;
}

.price{
  font-size:28px;
  font-weight:bold;
  color:#ffd166;
  margin:12px 0 6px;
}

.small{
  color:#d7d4ff;
  font-size:15px;
}

.btn{
  display:block;
  width:100%;
  padding:14px 16px;
  margin-top:12px;
  border-radius:14px;
  color:white;
  text-decoration:none;
  font-weight:bold;
  border:1px solid rgba(255,255,255,.18);
}

.paypal{
  background:linear-gradient(135deg,#0070ba,#003087);
}

.wa{
  background:linear-gradient(135deg,#25d366,#128c7e);
}

input, select, textarea{
  width:100%;
  padding:13px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.16);
  background:rgba(0,0,0,.25);
  color:white;
  font:inherit;
}

textarea{
  min-height:80px;
}

footer{
  margin-top:20px;
  color:#aaa;
  font-size:13px;
}
</style>
</head>

<body>

<div class="wrap">

  <h1>Japonés para Cerebros Fritos</h1>

  <div class="card">
    <img id="publicidad" src="data/publicidad1.png" alt="Japonés para Cerebros Fritos">
  </div>

  <div class="card">
    <h2>Al mismo precio de las Galletas Ángulo</h2>
    <img src="data/angulo.png" alt="Galletas Ángulo">
    <div class="price">USD $1.50</div>
    <p class="small">
      Donación obligatoria 😂 por PayPal.
      <br>
      En moneda local puede variar por comisiones.
    </p>

    <a class="btn paypal" href="https://paypal.me/asallamsensei" target="_blank">
      Pagar por PayPal
    </a>
  </div>

  <div class="card">
    <h2>Inscripción</h2>

    <input id="nombre" type="text" placeholder="Tu nombre">
    <input id="pais" type="text" placeholder="País">
    <input id="correo" type="email" placeholder="Correo">

    <select id="pago">
      <option value="">Forma de pago</option>
      <option>PayPal</option>
      <option>Peso mexicano</option>
      <option>Soles</option>
      <option>Peso colombiano</option>
    </select>

    <textarea id="mensaje" placeholder="Mensaje opcional"></textarea>

    <a class="btn wa" href="#" onclick="inscribirme()">
      Inscribirme por WhatsApp
    </a>

    <p class="small">
      Fecha: por cuadrar.
    </p>
  </div>

  <div class="card">
    <h2>Contacto</h2>

    <a class="btn wa" href="https://wa.me/##########" target="_blank">
      WhatsApp Asallam
    </a>

    <a class="btn wa" href="https://wa.me/##########" target="_blank">
      WhatsApp Tomoe
    </a>
  </div>

  <footer>
    © Cerebros Fritos
  </footer>

</div>

<script>
const publicidades = [
  "data/publicidad1.png",
  "data/publicidad2.png"
];

document.getElementById("publicidad").src =
  publicidades[Math.floor(Math.random() * publicidades.length)];

function inscribirme(){
  const nombre = document.getElementById("nombre").value.trim();
  const pais = document.getElementById("pais").value.trim();
  const correo = document.getElementById("correo").value.trim();
  const pago = document.getElementById("pago").value;
  const mensaje = document.getElementById("mensaje").value.trim();

  const texto =
`Hola, quiero inscribirme a Japonés para Cerebros Fritos.

Nombre: ${nombre || "No indicado"}
País: ${pais || "No indicado"}
Correo: ${correo || "No indicado"}
Forma de pago: ${pago || "No indicada"}
Mensaje: ${mensaje || "Sin mensaje"}

Vengo desde cerebrosfritos.com`;

  const numeroWhatsApp = "##########";
  const url = "https://wa.me/" + numeroWhatsApp + "?text=" + encodeURIComponent(texto);

  window.open(url, "_blank");
}
</script>

</body>
</html>
